spring:
  config:
    import: aws-parameterstore:/spring-plus/prod/
  datasource:
    url:  ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  cloud:
    aws:
      parameterstore:
        enabled: true
        region: ap-northeast-2
      region:
        static: ap-northeast-2
      credentials:
        instance-profile: true
      s3:
        bucket: spring-plus-bucket-hanbi

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
  info:
    env:
      enabled: true